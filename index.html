<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ramadan 2026 — Sylhet, Bangladesh</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Amiri:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #f5c842;
    --gold-dim: rgba(245,200,66,0.18);
    --purple-deep: #0f0c29;
    --purple-mid: #1a0533;
    --purple-light: #a78bfa;
    --glass-bg: rgba(255,255,255,0.04);
    --glass-dark: rgba(10,5,30,0.55);
    --border: rgba(255,255,255,0.09);
    --border-gold: rgba(245,200,66,0.18);
  }

  html { scroll-behavior: smooth; }

  body {
    min-height: 100vh;
    font-family: 'Lora', serif;
    background: linear-gradient(135deg, #0f0c29 0%, #1a0533 45%, #24243e 100%);
    color: #e9d5ff;
    overflow-x: hidden;
    position: relative;
  }

  /* ─── Scrollbar ─── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(245,200,66,0.35); border-radius: 2px; }

  /* ─── Stars Canvas ─── */
  #stars-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── Moon ─── */
  .moon-wrap {
    position: fixed;
    top: 5%;
    right: 7%;
    z-index: 1;
    pointer-events: none;
    animation: float-moon 6s ease-in-out infinite;
  }
  .moon {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fffbe6, #f5c842 42%, #c9963a 100%);
    box-shadow: 0 0 40px rgba(245,200,66,0.55), 0 0 90px rgba(245,200,66,0.25);
    position: relative;
  }
  .moon::after {
    content: '';
    position: absolute;
    top: 8px; left: 16px;
    width: 72px; height: 72px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(26,5,51,0.75) 55%, transparent 100%);
  }
  @keyframes float-moon {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-18px); }
  }

  /* ─── Ambient orbs ─── */
  .orb {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    animation: orb-breathe 8s ease-in-out infinite;
  }
  .orb-1 { width:320px;height:320px;bottom:15%;left:-8%;background:radial-gradient(circle,rgba(124,58,237,0.18) 0%,transparent 70%); }
  .orb-2 { width:420px;height:420px;top:25%;right:-12%;background:radial-gradient(circle,rgba(76,29,149,0.15) 0%,transparent 70%);animation-delay:3s; }
  @keyframes orb-breathe {
    0%,100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(1.12); opacity: 0.7; }
  }

  /* ─── Page wrapper ─── */
  .page {
    position: relative;
    z-index: 10;
    max-width: 760px;
    margin: 0 auto;
    padding: 2.5rem 1.25rem 3rem;
  }

  /* ─── Header ─── */
  .header { text-align: center; margin-bottom: 2.5rem; animation: fade-up 1s ease both; }
  .header .sub {
    font-size: .72rem; letter-spacing: .35em; text-transform: uppercase;
    color: #fde68a; opacity: .75; margin-bottom: .5rem;
  }
  .header h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.7rem, 5vw, 3rem);
    color: var(--gold);
    text-shadow: 0 0 24px rgba(245,200,66,.7), 0 0 50px rgba(245,200,66,.3);
    line-height: 1.25;
    margin-bottom: .4rem;
  }
  .header h2 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(.85rem, 2.5vw, 1.25rem);
    color: var(--purple-light);
    letter-spacing: .2em;
  }
  .header .live-clock {
    margin-top: .55rem;
    font-size: .78rem;
    color: #9f7aea;
    opacity: .65;
  }

  /* ─── Glass card ─── */
  .glass-card {
    background: var(--glass-dark);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border-gold);
    border-radius: 1.5rem;
  }

  /* ─── Countdown hero ─── */
  .countdown-hero {
    padding: 2rem 1.5rem;
    margin-bottom: 1.75rem;
    text-align: center;
    animation: fade-up .9s .2s ease both;
    box-shadow: 0 0 28px rgba(245,200,66,.12), 0 0 60px rgba(245,200,66,.07);
    animation: fade-up .9s .2s ease both, pulse-glow 2.5s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%,100% { box-shadow: 0 0 22px rgba(245,200,66,.15), 0 0 55px rgba(245,200,66,.07); }
    50%      { box-shadow: 0 0 45px rgba(245,200,66,.35), 0 0 100px rgba(245,200,66,.17); }
  }
  .countdown-label {
    font-size: .7rem; letter-spacing: .3em; text-transform: uppercase;
    color: #c4b5fd; margin-bottom: .35rem;
  }
  .countdown-timer {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(2.8rem, 10vw, 5.5rem);
    color: var(--gold);
    text-shadow: 0 0 22px rgba(245,200,66,.65), 0 0 50px rgba(245,200,66,.3);
    letter-spacing: .06em;
    line-height: 1.1;
    margin: .3rem 0 1rem;
    transition: color .3s;
  }
  .time-pills {
    display: flex; justify-content: center; align-items: center; gap: 2rem;
    margin-top: .5rem;
  }
  .time-pill { text-align: center; }
  .time-pill-label {
    font-size: .6rem; letter-spacing: .3em; text-transform: uppercase;
    color: var(--gold); opacity: .75; margin-bottom: .25rem;
  }
  .time-pill-val { font-size: 1.35rem; color: #fff; }
  .divider-v { width: 1px; height: 40px; background: rgba(124,58,237,.45); }
  .today-meta {
    margin-top: .9rem;
    font-size: .72rem; color: #7c5fa0; letter-spacing: .04em;
  }

  /* ─── Dua buttons ─── */
  .dua-btns {
    display: flex; gap: .75rem; justify-content: center;
    margin-bottom: 1.75rem;
    animation: fade-up .8s .35s ease both;
  }
  .dua-btn {
    background: var(--glass-bg);
    border: 1px solid rgba(245,200,66,.28);
    border-radius: 999px;
    padding: .55rem 1.4rem;
    font-family: 'Lora', serif;
    font-size: .82rem;
    color: #fde68a;
    cursor: pointer;
    transition: background .2s, border-color .2s, transform .15s;
    backdrop-filter: blur(10px);
  }
  .dua-btn:hover {
    background: rgba(245,200,66,.1);
    border-color: rgba(245,200,66,.6);
    transform: scale(1.05);
  }
  .dua-btn:active { transform: scale(.97); }

  /* ─── Schedule table card ─── */
  .schedule-card {
    animation: fade-up .9s .5s ease both;
    overflow: hidden;
  }
  .schedule-header {
    padding: 1.1rem 1.5rem;
    border-bottom: 1px solid rgba(124,58,237,.3);
  }
  .schedule-header h3 {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1rem; color: var(--gold); letter-spacing: .06em;
  }
  .schedule-header p { font-size: .68rem; color: #6d5a8a; margin-top: .2rem; }

  .table-wrap { overflow-x: auto; max-height: 520px; overflow-y: auto; }

  table { width: 100%; border-collapse: collapse; font-size: .82rem; }
  thead {
    position: sticky; top: 0;
    background: rgba(15,10,40,.96);
    backdrop-filter: blur(10px);
    z-index: 5;
  }
  th {
    padding: .7rem 1rem;
    text-align: left;
    font-family: 'Lora', serif;
    font-weight: 400;
    font-size: .62rem;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: .8;
  }
  td { padding: .65rem 1rem; border-bottom: 1px solid rgba(76,29,149,.2); }

  tr.row-even td { background: rgba(255,255,255,.015); }
  tr.row-today td { background: linear-gradient(90deg,rgba(245,200,66,.1) 0%,rgba(124,58,237,.08) 100%); }
  tr.row-today .day-num { color: var(--gold); font-weight: 600; }
  tr.row-today .sehri-time { color: #fde68a; }
  tr.row-today .iftar-time { color: #fdba74; }

  .today-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 6px var(--gold);
    margin-right: 6px;
    vertical-align: middle;
    animation: blink-dot 1.4s ease-in-out infinite;
  }
  @keyframes blink-dot {
    0%,100%{opacity:1;} 50%{opacity:.3;}
  }

  .day-num { color: #c4b5fd; }
  .weekday-cell { color: #9f7aea; font-size: .75rem; }
  .date-cell { color: #a78bfa; }
  .sehri-time, .iftar-time { color: #c4b5fd; font-size: .8rem; }
  .pill {
    display: inline-block;
    padding: .1rem .5rem;
    border-radius: 999px;
    background: rgba(245,200,66,.08);
  }
  tr.row-today .pill-sehri { background: rgba(245,200,66,.15); color: #fde68a; }
  tr.row-today .pill-iftar { background: rgba(251,146,60,.15); color: #fdba74; }

  /* ─── Footer ─── */
  .footer {
    text-align: center;
    margin-top: 2.2rem;
    font-size: .72rem;
    color: #4a3670;
    letter-spacing: .04em;
    padding-bottom: 1rem;
    font-family: 'Amiri', serif;
    font-size: .95rem;
  }

  /* ─── DUA MODAL ─── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(5,2,20,.88);
    backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    padding: 1rem;
    opacity: 0; pointer-events: none;
    transition: opacity .3s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal-box {
    background: rgba(15,8,40,.92);
    border: 1px solid rgba(245,200,66,.2);
    border-radius: 1.6rem;
    padding: 2rem 1.75rem 1.6rem;
    max-width: 480px; width: 100%;
    position: relative;
    transform: translateY(40px) scale(.94);
    transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .3s;
    opacity: 0;
  }
  .modal-overlay.open .modal-box {
    transform: translateY(0) scale(1);
    opacity: 1;
  }

  .modal-close {
    position: absolute; top: 1rem; right: 1.2rem;
    background: none; border: none;
    font-size: 1.6rem; color: #7c5fa0;
    cursor: pointer; line-height: 1;
    transition: color .2s;
  }
  .modal-close:hover { color: var(--gold); }

  .modal-tabs {
    display: flex; gap: .6rem; margin-bottom: 1.5rem;
  }
  .modal-tab {
    flex: 1; padding: .45rem; border-radius: 999px;
    font-family: 'Lora', serif; font-size: .8rem;
    cursor: pointer; transition: all .2s;
    border: 1px solid rgba(124,58,237,.4);
    background: transparent; color: #9f7aea;
  }
  .modal-tab.active {
    background: rgba(245,200,66,.15);
    border-color: rgba(245,200,66,.5);
    color: var(--gold);
  }

  .dua-arabic {
    font-family: 'Amiri', serif;
    font-size: 1.55rem;
    color: #fde68a;
    text-align: center;
    direction: rtl;
    line-height: 1.9;
    margin-bottom: .9rem;
  }
  .modal-divider {
    width: 56px; height: 1px;
    background: rgba(245,200,66,.25);
    margin: 0 auto .9rem;
  }
  .dua-transliteration {
    font-style: italic; font-size: .83rem;
    color: #c4b5fd; text-align: center;
    line-height: 1.7; margin-bottom: .9rem;
  }
  .dua-english {
    font-size: .8rem; color: #9f7aea;
    text-align: center; line-height: 1.65;
  }
  .modal-hint { font-size: .65rem; color: #4a3670; text-align: center; margin-top: 1.1rem; }

  /* ─── Animations ─── */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── Responsive ─── */
  @media (max-width: 480px) {
    th, td { padding: .55rem .6rem; }
    .time-pills { gap: 1.2rem; }
    .countdown-timer { font-size: 2.6rem; }
  }
</style>
</head>
<body>

<!-- Stars -->
<canvas id="stars-canvas"></canvas>

<!-- Moon -->
<div class="moon-wrap"><div class="moon"></div></div>

<!-- Orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<!-- ═══ DUA MODAL ═══ -->
<div class="modal-overlay" id="duaModal">
  <div class="modal-box">
    <button class="modal-close" id="modalClose">×</button>

    <div class="modal-tabs">
      <button class="modal-tab active" data-dua="sehri">🌙 Sehri Dua</button>
      <button class="modal-tab"        data-dua="iftar">☀️ Iftar Dua</button>
    </div>

    <div class="dua-arabic" id="duaArabic"></div>
    <div class="modal-divider"></div>
    <div class="dua-transliteration" id="duaTranslit"></div>
    <div class="modal-divider"></div>
    <div class="dua-english" id="duaEnglish"></div>
    <div class="modal-hint">Tap outside to close</div>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<main class="page">

  <!-- Header -->
  <div class="header">
    <p class="sub">Ramadan Mubarak 2026</p>
    <h1>রমজানের সময়সূচি</h1>
    <h2>Sylhet, Bangladesh</h2>
    <div class="live-clock" id="liveClock">—</div>
  </div>

  <!-- Countdown -->
  <div class="glass-card countdown-hero" id="heroCard">
    <div class="countdown-label" id="cdLabel">Loading…</div>
    <div class="countdown-timer" id="cdTimer">--:--:--</div>
    <div class="time-pills">
      <div class="time-pill">
        <div class="time-pill-label">Sehri</div>
        <div class="time-pill-val" id="heroSehri">—</div>
      </div>
      <div class="divider-v"></div>
      <div class="time-pill">
        <div class="time-pill-label">Iftar</div>
        <div class="time-pill-val" id="heroIftar">—</div>
      </div>
    </div>
    <div class="today-meta" id="heroMeta"></div>
  </div>

  <!-- Dua Buttons -->
  <div class="dua-btns">
    <button class="dua-btn" data-dua="sehri">🌙 Sehri Dua</button>
    <button class="dua-btn" data-dua="iftar">☀️ Iftar Dua</button>
  </div>

  <!-- Schedule Table -->
  <div class="glass-card schedule-card">
    <div class="schedule-header">
      <h3>Full Ramadan Schedule</h3>
      <p>Times are approximate — please verify with your local authority</p>
    </div>
    <div class="table-wrap" id="tableWrap">
      <table>
        <thead>
          <tr>
            <th>Day</th>
            <th>Date</th>
            <th>Weekday</th>
            <th>Sehri</th>
            <th>Iftar</th>
          </tr>
        </thead>
        <tbody id="scheduleBody"></tbody>
      </table>
    </div>
  </div>

  <div class="footer">رَمَضَانُ شَهْرٌ مُبَارَكٌ — Ramadan is a blessed month</div>

</main>

<script>
// ═══════════════════════════════════════════════════════════════
//  RAMADAN 2026 DATA — Sylhet, Bangladesh (GMT+6)
//  Replace this array with your actual 2026 CSV/JSON data.
//  Format: { day, date:"YYYY-MM-DD", weekday, sehri:"HH:MM", iftar:"HH:MM" }
// ═══════════════════════════════════════════════════════════════
const RAMADAN_START = "2026-02-18"; // ← Update to actual Ramadan 1 date

const SCHEDULE = (() => {
  const weekdays = ["Wednesday","Thursday","Friday","Saturday","Sunday","Monday","Tuesday"];
  const rows = [];
  for (let i = 0; i < 30; i++) {
    const d = new Date(RAMADAN_START);
    d.setDate(d.getDate() + i);
    const dateStr = d.toISOString().split("T")[0];
    // Approximate Sylhet times — swap with real data!
    const sMin = (5 * 60 + 10) - Math.floor(i / 3);
    const iMin = (18 * 60 + 3)  + Math.floor(i / 3);
    const fmt = m => `${String(Math.floor(m/60)).padStart(2,"0")}:${String(m%60).padStart(2,"0")}`;
    rows.push({ day: i+1, date: dateStr, weekday: weekdays[i % 7], sehri: fmt(sMin), iftar: fmt(iMin) });
  }
  return rows;
})();

// ─── Dua data ───
const DUAS = {
  sehri: {
    arabic: "وَبِصَوْمِ غَدٍ نَّوَيْتُ مِنْ شَهْرِ رَمَضَانَ",
    transliteration: "Wa bisawmi ghadin nawaytu min shahri Ramadan",
    english: '"I intend to keep the fast for tomorrow in the month of Ramadan"'
  },
  iftar: {
    arabic: "اللَّهُمَّ اِنِّى لَكَ صُمْتُ وَبِكَ آمَنْتُ وَعَلَيْكَ تَوَكَّلْتُ وَعَلَى رِزْقِكَ أَفْطَرْتُ",
    transliteration: "Allahumma inni laka sumtu wa bika amantu wa 'alayka tawakkaltu wa 'ala rizqika aftartu",
    english: '"O Allah! I fasted for You and I believe in You and I put my trust in You and I break my fast with Your sustenance"'
  }
};

// ─── Helpers ───
function getDhakaTime() {
  return new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Dhaka" }));
}
function toMin(str) { const [h,m]=str.split(":").map(Number); return h*60+m; }
function fmtCountdown(s) {
  if (s <= 0) return "00:00:00";
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  return [h,m,sec].map(v=>String(v).padStart(2,"0")).join(":");
}
function getTodayEntry() {
  const today = getDhakaTime().toISOString().split("T")[0];
  return SCHEDULE.find(r => r.date === today) || null;
}
function getCountdownInfo(entry) {
  if (!entry) return { label:"Schedule not available for today", seconds:0, type:"none" };
  const now = getDhakaTime();
  const nowMin = now.getHours()*60 + now.getMinutes();
  const nowSec = now.getSeconds();
  const sMin = toMin(entry.sehri), iMin = toMin(entry.iftar);
  if (nowMin < sMin)  return { label:"Sehri ends in",            seconds:(sMin-nowMin)*60-nowSec, type:"sehri" };
  if (nowMin < iMin)  return { label:"Iftar in",                 seconds:(iMin-nowMin)*60-nowSec, type:"iftar" };
  return { label:"Iftar done — Sehri tomorrow", seconds:0, type:"done" };
}

// ─── Build table ───
const tbody = document.getElementById("scheduleBody");
SCHEDULE.forEach((row, idx) => {
  const tr = document.createElement("tr");
  tr.dataset.date = row.date;
  tr.className = idx % 2 === 0 ? "row-even" : "";
  tr.innerHTML = `
    <td class="day-num"><span class="today-dot" style="display:none"></span>${row.day}</td>
    <td class="date-cell">${row.date}</td>
    <td class="weekday-cell">${row.weekday}</td>
    <td><span class="pill pill-sehri sehri-time">${row.sehri}</span></td>
    <td><span class="pill pill-iftar iftar-time">${row.iftar}</span></td>
  `;
  tbody.appendChild(tr);
});

// ─── Update UI ───
function update() {
  const now = getDhakaTime();
  // Clock
  document.getElementById("liveClock").textContent =
    now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:true,timeZone:"Asia/Dhaka"})
    + " — Asia/Dhaka (GMT+6)";

  const entry = getTodayEntry();
  const info  = getCountdownInfo(entry);

  // Countdown
  document.getElementById("cdLabel").textContent = info.label;
  document.getElementById("cdTimer").textContent = fmtCountdown(info.seconds);

  if (entry) {
    document.getElementById("heroSehri").textContent = entry.sehri;
    document.getElementById("heroIftar").textContent = entry.iftar;
    document.getElementById("heroMeta").textContent  =
      `Ramadan Day ${entry.day} — ${entry.weekday}, ${entry.date}`;
  }

  // Highlight today row
  document.querySelectorAll("#scheduleBody tr").forEach(tr => {
    const isToday = entry && tr.dataset.date === entry.date;
    tr.classList.toggle("row-today", isToday);
    tr.querySelector(".today-dot").style.display = isToday ? "inline-block" : "none";
  });
}
update();
setInterval(update, 1000);

// Scroll today into view once
setTimeout(() => {
  const todayRow = document.querySelector("#scheduleBody tr.row-today");
  if (todayRow) todayRow.scrollIntoView({ behavior:"smooth", block:"center" });
}, 600);

// ─── Modal ───
const modal    = document.getElementById("duaModal");
const modalClose = document.getElementById("modalClose");
let currentDua = "sehri";

function fillDua(type) {
  currentDua = type;
  const d = DUAS[type];
  document.getElementById("duaArabic").textContent   = d.arabic;
  document.getElementById("duaTranslit").textContent = d.transliteration;
  document.getElementById("duaEnglish").textContent  = d.english;
  document.querySelectorAll(".modal-tab").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.dua === type);
  });
}

function openModal(type) {
  fillDua(type);
  modal.classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal() {
  modal.classList.remove("open");
  document.body.style.overflow = "";
}

document.querySelectorAll(".dua-btn").forEach(btn =>
  btn.addEventListener("click", () => openModal(btn.dataset.dua)));

document.querySelectorAll(".modal-tab").forEach(btn =>
  btn.addEventListener("click", () => fillDua(btn.dataset.dua)));

modalClose.addEventListener("click", closeModal);
modal.addEventListener("click", e => { if (e.target === modal) closeModal(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
// Init dua text
fillDua("sehri");

// ═══════════════════════════════════════════════════════════════
//  STARS — Canvas
// ═══════════════════════════════════════════════════════════════
(function() {
  const canvas = document.getElementById("stars-canvas");
  const ctx    = canvas.getContext("2d");
  let stars    = [];
  let W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resize);
  resize();

  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random(),
      y: Math.random(),
      r: Math.random() * 1.6 + 0.4,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * .8 + .4,
    });
  }

  function draw(t) {
    ctx.clearRect(0, 0, W, H);
    stars.forEach(s => {
      const alpha = .35 + .65 * (.5 + .5 * Math.sin(t * s.speed * .001 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(245,200,66,${alpha.toFixed(2)})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>
